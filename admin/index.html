<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LvTaxi – Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafb;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 3rem 2.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 1.8rem; font-weight: 900; color: #f59e0b; letter-spacing: 1px; margin-bottom: .5rem; }
    .tagline { font-size: .9rem; color: #6b7280; margin-bottom: 2.5rem; }
    .link-btn {
      display: block;
      background: #f59e0b;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border-radius: 8px;
      padding: .85rem 1.5rem;
      margin-bottom: 1rem;
      transition: background .15s;
    }
    .link-btn:hover { background: #d97706; }
    .link-btn.secondary { background: #1a1a2e; }
    .link-btn.secondary:hover { background: #2d2d4e; }
    .admin-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #6b7280;
      font-size: .8rem;
      text-decoration: none;
    }
    .admin-link:hover { color: #1a1a2e; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">LvTaxi</div>
    <p class="tagline">Las Vegas Staging Zone App</p>
    <a href="/privacy" class="link-btn">Privacy Policy</a>
    <a href="/terms" class="link-btn secondary">Terms of Service</a>
    <a href="/admin" class="admin-link">Admin sign-in →</a>
  </div>
</body>
</html>
